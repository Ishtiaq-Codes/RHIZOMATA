{% extends 'core/base.html' %}
{% load static %}

{% block content %}
<section id="contact-page" style="padding: 10rem 1.5rem 8rem; background: var(--bg-main); min-height: 100vh; position: relative;">
    <div class="concept-bg-accent" style="background:var(--color-purple);top:-10%;right:-100px;opacity:0.04;" aria-hidden="true"></div>

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-16 reveal-up">
            <span class="section-label">Connect with the Creator</span>
            <h1 class="section-heading mt-4">Contact Us</h1>
            <p class="text-gray-400 font-['Inter'] max-w-2xl mx-auto mt-6">
                Have questions about the game, order inquiries, or want to share your Rhizomata stories? Reach out below.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- Contact Form -->
            <div class="reveal-left">
                <form class="space-y-6 bg-white/5 p-8 rounded-xl border border-white/10 backdrop-blur-sm">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-400 font-['Inter'] mb-2">Name</label>
                        <input type="text" id="name" name="name" class="w-full bg-black/40 border border-white/10 rounded-md px-4 py-3 text-white font-['Inter'] focus:outline-none focus:border-teal-500 transition-colors" placeholder="Your name">
                    </div>
                    
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-400 font-['Inter'] mb-2">Email Address</label>
                        <input type="email" id="email" name="email" class="w-full bg-black/40 border border-white/10 rounded-md px-4 py-3 text-white font-['Inter'] focus:outline-none focus:border-teal-500 transition-colors" placeholder="your@email.com">
                    </div>

                    <div>
                        <label for="message" class="block text-sm font-medium text-gray-400 font-['Inter'] mb-2">Message</label>
                        <textarea id="message" name="message" rows="5" class="w-full bg-black/40 border border-white/10 rounded-md px-4 py-3 text-white font-['Inter'] focus:outline-none focus:border-teal-500 transition-colors" placeholder="How can we help?"></textarea>
                    </div>

                    <button type="submit" class="w-full btn-primary py-4 text-lg justify-center flex items-center">
                        Send Message
                    </button>
                </form>
            </div>

            <!-- Direct Info & Socials -->
            <div class="reveal-right flex flex-col justify-center space-y-8 pl-0 md:pl-8">
                <div>
                    <h3 class="text-xl font-['Cinzel'] text-white mb-2">Email</h3>
                    <a href="mailto:info@rhizomata.com" class="text-teal-400 hover:text-teal-300 font-['Inter'] text-lg transition-colors">info@rhizomata.com</a>
                </div>

                <div>
                    <h3 class="text-xl font-['Cinzel'] text-white mb-4">Follow the Journey</h3>
                    <div class="flex gap-4">
                        <a href="#" class="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center text-white hover:bg-white/10 transition-colors" aria-label="Instagram">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                        </a>
                        <!-- Future social links can go here -->
                    </div>
                </div>

                <div>
                    <p class="text-sm text-gray-500 font-['Inter'] mt-8 italic">
                        Created by Amna Noor
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
